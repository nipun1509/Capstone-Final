kind = "web"
previewPath = "/"
title = "EmoLearn"
version = "1.0.0"
id = "artifacts/emolearn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25518
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/emolearn run dev"

[services.env]
PORT = "25518"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/emolearn", "run", "build"]
publicDir = "artifacts/emolearn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
